tests:
  - name: half_adder
    type: simulation
    path: simulation/example/half_adder
    comment: "半加算器の真理値表テスト"
  - name: generator_pattern
    type: simulation
    path: simulation/generator/generator_pattern
    comment: "ジェネレーターのパターン適用と case override"

  - name: tester_basic
    type: simulation
    path: simulation/output/tester_basic
    comment: "Tester による tick ごとの期待値検証"

  # === ワイヤ動作テスト ===
  - name: eight_directions
    type: simulation
    path: simulation/wire/eight_directions
    comment: "8方向ワイヤの即時伝搬・遅延伝搬の確認"

  - name: feedback_oscillator
    type: simulation
    path: simulation/wire/feedback_oscillator
    comment: "3セルNOTリングの周期2振動"

  - name: mixed_polarity_fan_in
    type: simulation
    path: simulation/wire/mixed_polarity_fan_in
    comment: "正負混合ワイヤの OR 合成"

  # === セル動作テスト ===
  - name: isolated_cell_retains
    type: simulation
    path: simulation/cell/isolated_cell_retains
    comment: "入力なしセルの値保持"

  # === 境界テスト ===
  - name: i32_extreme_coords
    type: simulation
    path: simulation/boundary/i32_extreme_coords
    comment: "i32 極値付近の座標での動作確認"

  - name: negative_coordinates
    type: simulation
    path: simulation/boundary/negative_coordinates
    comment: "全負座標の回路"

  # === 解析エラー検知テスト ===
  - name: validation_self_loop
    type: parse_error
    path: parse_error/self_loop
    comment: "Self-loop wire is rejected"

  - name: validation_duplicate_wire_same_kind
    type: parse_error
    path: parse_error/duplicate_wire_same_kind
    comment: "同種多重辺を拒否"

  - name: validation_duplicate_wire_diff_kind
    type: parse_error
    path: parse_error/duplicate_wire_diff_kind
    comment: "異種多重辺を拒否"

  - name: validation_unknown_wire_kind
    type: parse_error
    path: parse_error/unknown_wire_kind
    comment: "不正な kind 文字列を拒否"

  - name: validation_generator_incoming
    type: parse_error
    path: parse_error/generator_incoming
    comment: "Generator target with incoming wire is rejected"

  - name: validation_generator_duplicate_target
    type: parse_error
    path: parse_error/generator_duplicate_target
    comment: "Duplicate generator target is rejected"

  - name: validation_generator_empty_pattern
    type: parse_error
    path: parse_error/generator_empty_pattern
    comment: "Empty generator pattern is rejected"

  - name: validation_generator_invalid_pattern_char
    type: parse_error
    path: parse_error/generator_invalid_pattern_char
    comment: "Invalid generator pattern character is rejected"

  - name: validation_tester_invalid_expected_pattern_char
    type: parse_error
    path: parse_error/tester_invalid_expected_pattern_char
    comment: "Invalid tester expected pattern character is rejected"

  - name: validation_tester_duplicate_target
    type: parse_error
    path: parse_error/tester_duplicate_target
    comment: "Duplicate tester target is rejected"

  # === 総合テスト ===
  - name: sr_latch
    type: simulation
    path: simulation/example/sr_latch
    comment: "NOR SR ラッチの set/hold 動作"

  - name: jk_flipflop
    type: simulation
    path: simulation/example/jk_flipflop
    comment: "JK フリップフロップの動作確認"

  - name: full_adder
    type: simulation
    path: simulation/example/full_adder
    comment: "全加算器の真理値表テスト (AND=NOT(NAND) 構成)"

  - name: shift_register
    type: simulation
    path: simulation/example/shift_register
    comment: "2段シフトレジスタの遅延伝搬テスト"

  # === サブ回路シミュレーションテスト ===
  - name: sub_circuit_inverter
    type: simulation
    path: simulation/sub_circuit/sub_circuit_inverter
    comment: "サブ回路インバータモジュールの動作確認"

  - name: sub_circuit_half_adder
    type: simulation
    path: simulation/sub_circuit/sub_circuit_half_adder
    comment: "半加算器サブ回路モジュールの真理値表テスト"

  - name: sub_circuit_chain
    type: simulation
    path: simulation/sub_circuit/sub_circuit_chain
    comment: "サブ回路出力が後続ワイヤに伝搬するチェーンテスト"

  - name: sub_circuit_two_instances
    type: simulation
    path: simulation/sub_circuit/sub_circuit_two_instances
    comment: "同一サブ回路を2回インスタンス化し独立動作を確認"

  # === サブ回路解析エラーテスト ===
  - name: validation_sub_circuit_not_found
    type: parse_error
    path: parse_error/sub_circuit_not_found
    comment: "存在しないサブ回路名の参照を拒否"

  - name: validation_sub_circuit_circular_dependency
    type: parse_error
    path: parse_error/sub_circuit_circular_dependency
    comment: "サブ回路間の循環依存を検出・拒否"

  - name: validation_sub_circuit_input_count_mismatch
    type: parse_error
    path: parse_error/sub_circuit_input_count_mismatch
    comment: "モジュール入力ポート数と sub_input 数の不一致を拒否"

  - name: validation_sub_circuit_output_count_mismatch
    type: parse_error
    path: parse_error/sub_circuit_output_count_mismatch
    comment: "モジュール出力ポート数と sub_output 数の不一致を拒否"

  - name: validation_sub_circuit_sub_input_incoming_wire
    type: parse_error
    path: parse_error/sub_circuit_sub_input_incoming_wire
    comment: "sub_input に入力ワイヤが接続された場合を拒否"
